name: Site change
description: Blog post, theme tweak, or other site update
title: "[Site] "
labels: ["enhancement"]
assignees:
  - asbjborg
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What are you changing?
      placeholder: "e.g., New post about Night Shift"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Context, links, or notes
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Content ready (`_posts/` and assets if any)
        - [ ] Local preview (`bundle exec jekyll serve`)
        - [ ] Pushed to `main` (or PR merged)
